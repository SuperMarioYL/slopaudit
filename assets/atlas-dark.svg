<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="SlopAudit architecture: the CLI walks and parses a JS/TS repo to ASTs, runs three pure AST detectors, aggregates findings into a deterministic SlopScore (0-100), and renders a terminal report, HTML heatmap and SVG badge">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/></marker>
  </defs>
  <rect x="0" y="0" width="880" height="360" fill="#1D1D1F"/>

  <!-- offline / deterministic frame -->
  <rect x="20" y="24" width="840" height="312" rx="18" fill="none" stroke="#2DC79A" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="40" y="46" font-size="13" font-weight="600" fill="#2DC79A">100% static · offline · deterministic — no LLM, no network, same repo → same score</text>

  <!-- connectors -->
  <g stroke="#3A3A44" stroke-width="1.6" fill="none">
    <line x1="186" y1="200" x2="234" y2="200" marker-end="url(#ah-d)"/>
    <line x1="416" y1="200" x2="464" y2="200" marker-end="url(#ah-d)"/>
    <line x1="586" y1="200" x2="634" y2="200" marker-end="url(#ah-d)"/>
  </g>

  <!-- 1. Repo / CLI scan (blue infra) -->
  <g>
    <rect x="38" y="92" width="148" height="216" rx="15" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.6"/>
    <text x="112" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#9CCAFF">JS/TS repo</text>
    <text x="112" y="136" text-anchor="middle" font-size="11" fill="#A1A1A8">npx slopaudit .</text>
    <g font-size="11" fill="#9CCAFF">
      <rect x="54" y="150" width="116" height="44" rx="9" fill="#4DA3FF" fill-opacity="0.14" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="66" y="168" font-weight="600">scan/walk.ts</text>
      <text x="66" y="184" font-size="10" fill="#A1A1A8">fast-glob *.{js,ts,tsx}</text>
      <rect x="54" y="202" width="116" height="44" rx="9" fill="#4DA3FF" fill-opacity="0.14" stroke="#4DA3FF" stroke-width="1.1"/>
      <text x="66" y="220" font-weight="600">scan/parse.ts</text>
      <text x="66" y="236" font-size="10" fill="#A1A1A8">@babel/parser → AST</text>
      <rect x="54" y="254" width="116" height="38" rx="9" fill="#4DA3FF" fill-opacity="0.08" stroke="#4DA3FF" stroke-width="1.0"/>
      <text x="112" y="277" text-anchor="middle" font-size="10" fill="#A1A1A8">errorRecovery: never crash</text>
    </g>
  </g>

  <!-- 2. Detectors (amber — agent-overproduced patterns) -->
  <g>
    <rect x="234" y="92" width="182" height="216" rx="15" fill="#E8C84A" fill-opacity="0.16" stroke="#E8C84A" stroke-width="1.6"/>
    <text x="325" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#F0D77A">Detectors</text>
    <text x="325" y="136" text-anchor="middle" font-size="11" fill="#A1A1A8">pure fns: AST → SlopFinding[]</text>
    <g font-size="11.5" font-weight="600" fill="#F0D77A">
      <rect x="250" y="148" width="150" height="44" rx="9" fill="#E8C84A" fill-opacity="0.16" stroke="#E8C84A" stroke-width="1.2"/>
      <text x="262" y="166">over_abstraction</text>
      <text x="262" y="183" font-size="10" font-weight="400" fill="#A1A1A8">wrapper chains, factories</text>
      <rect x="250" y="200" width="150" height="44" rx="9" fill="#E8C84A" fill-opacity="0.16" stroke="#E8C84A" stroke-width="1.2"/>
      <text x="262" y="218">generic_boilerplate</text>
      <text x="262" y="235" font-size="10" font-weight="400" fill="#A1A1A8">dup scaffold, copy-paste</text>
      <rect x="250" y="252" width="150" height="44" rx="9" fill="#E8C84A" fill-opacity="0.16" stroke="#E8C84A" stroke-width="1.2"/>
      <text x="262" y="270">plausible_but_wrong</text>
      <text x="262" y="287" font-size="10" font-weight="400" fill="#A1A1A8">empty catch, any, dead branch</text>
    </g>
  </g>

  <!-- 3. Score / aggregate (red — the headline number) -->
  <g>
    <rect x="464" y="120" width="122" height="160" rx="15" fill="#F2785C" fill-opacity="0.16" stroke="#F2785C" stroke-width="1.6"/>
    <text x="525" y="146" text-anchor="middle" font-size="14" font-weight="700" fill="#F7A593">score/</text>
    <text x="525" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#F7A593">aggregate.ts</text>
    <text x="525" y="190" text-anchor="middle" font-size="11" fill="#A1A1A8">weighted density,</text>
    <text x="525" y="206" text-anchor="middle" font-size="11" fill="#A1A1A8">normalized 0..100</text>
    <rect x="480" y="222" width="90" height="40" rx="10" fill="#F2785C" fill-opacity="0.22" stroke="#F2785C" stroke-width="1.3"/>
    <text x="525" y="241" text-anchor="middle" font-size="12" font-weight="700" fill="#F7A593">SlopScore</text>
    <text x="525" y="256" text-anchor="middle" font-size="10" fill="#A1A1A8">clean · moderate · heavy</text>
  </g>

  <!-- 4. Report (green — shareable artifacts) -->
  <g>
    <rect x="634" y="92" width="188" height="216" rx="15" fill="#2DC79A" fill-opacity="0.12" stroke="#2DC79A" stroke-width="1.6"/>
    <text x="728" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#6BE0BF">report/</text>
    <text x="728" y="136" text-anchor="middle" font-size="11" fill="#A1A1A8">SlopScore → artifacts</text>
    <g font-size="11.5" font-weight="600" fill="#6BE0BF">
      <rect x="650" y="148" width="156" height="44" rx="9" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.2"/>
      <text x="662" y="166">terminal.ts</text>
      <text x="662" y="183" font-size="10" font-weight="400" fill="#A1A1A8">chalk headline + heatmap</text>
      <rect x="650" y="200" width="156" height="44" rx="9" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.2"/>
      <text x="662" y="218">html.ts</text>
      <text x="662" y="235" font-size="10" font-weight="400" fill="#A1A1A8">self-contained report.html</text>
      <rect x="650" y="252" width="156" height="44" rx="9" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.2"/>
      <text x="662" y="270">badge.ts</text>
      <text x="662" y="287" font-size="10" font-weight="400" fill="#A1A1A8">shields-style badge.svg</text>
    </g>
  </g>
</svg>
